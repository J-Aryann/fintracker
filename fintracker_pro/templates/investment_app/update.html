{% extends 'base.html' %}

{% block title %}
<title>Update Investment</title>
{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #f4f6f9, #e9eef5);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-wrapper {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        width: 100%;
        max-width: 600px;
        background: #fff;
        border-radius: 18px;
        padding: 35px 30px;
        box-shadow: 0 18px 45px rgba(0,0,0,0.12);
        position: relative;
    }

    .form-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 6px;
        width: 100%;
        background: linear-gradient(90deg, #0d6efd, #20c997);
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
    }

    .form-title {
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        color: #0d6efd;
        text-transform: uppercase;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    form p {
        margin-bottom: 15px;
    }

    label {
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        background: #f9f9f9;
        transition: 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #0d6efd;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
        outline: none;
    }

    .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 20px;
    }

    .btn-update {
        flex: 1;
        background: linear-gradient(135deg, #0d6efd, #20c997);
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: 700;
        transition: 0.25s ease;
    }

    .btn-update:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(13,110,253,0.25);
    }

    .btn-reset {
        flex: 1;
        background: #e9ecef;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: 700;
        transition: 0.25s ease;
    }

    .btn-reset:hover {
        background: #dee2e6;
        transform: translateY(-3px);
    }

    @media (max-width: 576px) {
        .btn-row {
            flex-direction: column;
        }
    }
</style>

<div class="form-wrapper">

    <div class="form-card">

        <div class="form-title">Update Investment</div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="btn-row">
                <button type="submit" class="btn-update">Update</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
