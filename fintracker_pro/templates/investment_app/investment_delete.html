{% extends 'base.html' %}

{% block title %}
<title>Delete Data</title>
{% endblock %}

{% block content %}

<style>
    body {
        background: #f4f6f9;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .delete-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }

    .delete-card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        text-align: center;
    }

    .warning-title {
        font-size: 22px;
        font-weight: 700;
        color: #dc3545;
        margin-bottom: 15px;
    }

    .info-box {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 20px;
        text-align: left;
        border-left: 4px solid #dc3545;
    }

    .info-box p {
        margin: 6px 0;
        font-size: 15px;
    }

    .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 10px;
    }

    .btn-confirm {
        flex: 1;
        background: #dc3545;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 10px;
        font-weight: 600;
    }

    .btn-confirm:hover {
        background: #bb2d3b;
    }

    .btn-cancel {
        flex: 1;
        background: #0d6efd;
        color: white;
        text-align: center;
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
    }

    .btn-cancel:hover {
        background: #0b5ed7;
        color: white;
    }
</style>

<div class="delete-wrapper">

    <div class="delete-card">

        <div class="warning-title">⚠️ Confirm Deletion</div>

        <div class="info-box">
            <p><strong>ID:</strong> {{ obj.id }}</p>
            <p><strong>Name:</strong> {{ obj.user }}</p>
        </div>

        <p>Are you sure you want to delete this record? This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}

            <div class="btn-group">
                <button type="submit" class="btn-confirm">Yes, Delete</button>

                <a href="{% url 'show_investment_url' %}" class="btn-cancel">
                    No, Cancel
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
