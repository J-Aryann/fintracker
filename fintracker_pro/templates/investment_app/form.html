{% extends 'base.html' %}

{% block title %}
<title>Investment Form</title>
{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #eef2f7, #dfe9f3);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 25px;
    }

    .form-card {
        width: 100%;
        max-width: 620px;
        background: #fff;
        border-radius: 20px;
        padding: 38px 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        position: relative;
        overflow: hidden;
        animation: fadeIn 0.4s ease-in-out;
    }

    .form-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 5px;
        width: 100%;
        background: linear-gradient(90deg, #0d6efd, #20c997);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        color: #0d6efd;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    .form-subtitle {
        text-align: center;
        font-size: 13px;
        color: #6c757d;
        margin-bottom: 28px;
    }

    /* Better Django form spacing control */
    .form-card form p {
        margin-bottom: 16px;
    }

    .form-card label {
        font-weight: 600;
        font-size: 13px;
        color: #343a40;
        margin-bottom: 6px;
        display: block;
    }

    .form-card input,
    .form-card select,
    .form-card textarea {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid #dee2e6;
        outline: none;
        transition: all 0.2s ease;
        background: #f8f9fa;
        font-size: 14px;
    }

    .form-card input:focus,
    .form-card select:focus,
    .form-card textarea:focus {
        border-color: #0d6efd;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.12);
    }

    .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 18px;
    }

    .btn-submit {
        flex: 1;
        background: linear-gradient(135deg, #0d6efd, #20c997);
        border: none;
        color: white;
        padding: 12px;
        border-radius: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 22px rgba(13, 110, 253, 0.25);
    }

    .btn-reset {
        flex: 1;
        background: #e9ecef;
        border: none;
        color: #343a40;
        padding: 12px;
        border-radius: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn-reset:hover {
        background: #dee2e6;
        transform: translateY(-2px);
    }

    @media (max-width: 576px) {
        .form-card {
            padding: 28px 20px;
        }

        .btn-row {
            flex-direction: column;
        }
    }
</style>

<div class="form-wrapper">
    <div class="form-card">

        <div class="form-title">Investment Form</div>
        <div class="form-subtitle">Enter your investment details carefully</div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="btn-row">
                <button type="submit" class="btn-submit">Submit</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
