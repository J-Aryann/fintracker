{% extends 'base.html' %}

{% block title %}
<title>Update Salary</title>
{% endblock %}

{% block content %}

<style>
    .update-card {
        max-width: 650px;
        margin: 50px auto;
        padding: 30px;
        border-radius: 15px;
        background: #fff;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .update-header {
        text-align: center;
        color: #198754;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 25px;
    }

    form p {
        margin-bottom: 18px;
    }

    form label {
        font-weight: 600;
        color: #555;
        display: block;
        margin-bottom: 6px;
    }

    form input,
    form select,
    form textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    form input:focus,
    form select:focus,
    form textarea:focus {
        border-color: #198754;
        box-shadow: 0 0 8px rgba(25, 135, 84, 0.25);
        outline: none;
    }

    .btn-update {
        background-color: #198754;
        color: white;
        border: none;
    }

    .btn-update:hover {
        background-color: #146c43;
        color: white;
    }

    .btn-reset {
        background-color: #dc3545;
        color: white;
        border: none;
    }

    .btn-reset:hover {
        background-color: #bb2d3b;
        color: white;
    }
</style>

<div class="container">

    <div class="update-card">

        <h2 class="update-header">
            Update Salary
        </h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="row mt-4">
                <div class="col-md-6 mb-2">
                    <button type="submit"
                            class="btn btn-update w-100">
                        Update Salary
                    </button>
                </div>

                <div class="col-md-6 mb-2">
                    <button type="reset"
                            class="btn btn-reset w-100">
                        Reset
                    </button>
                </div>
            </div>

        </form>

    </div>

</div>

{% endblock %}
